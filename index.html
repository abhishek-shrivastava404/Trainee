const LEVELS = [

  { name: "Trainee", min: 200, max: 500, color: "#f59e0b" },
  { name: "Athlete", min: 500, max: 1000, color: "#7c6af7" },

];

function getLevel(xp) {
  return LEVELS.findLast(l => xp >= l.min) || LEVELS[0];
}

function getDayOfYear() {
  const now = new Date();
  const start = new Date(now.getFullYear(), 0, 0);
  return Math.floor((now - start) / 86400000);
}

function getTodayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function loadFromStorage(key, fallback) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; }
  catch { return fallback; }
}

function saveToStorage(key, value) {
  try { localStorage.setItem(key, JSON.stringify(value)); } catch {}
}

function calcStreak(history) {
  let streak = 0;
  const today = getTodayKey();
  let d = new Date();
  while (true) {
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    const day = history[key];
    if (!day) break;
    if ((day.protein || 0) >= 80) streak++;
    else break;
    d.setDate(d.getDate() - 1);
  }
  return streak;
}

function BarChart({ data, targetLine, color, label }) {
  const maxVal = Math.max(...data.map(d => d.value), targetLine * 1.1, 1);
  const w = 300, h = 110, barW = 28, gap = 10, leftPad = 30, bottomPad = 22;
  const chartH = h - bottomPad;
  const targetY = chartH - (targetLine / maxVal) * chartH;
  return (
    <div style={{ marginBottom: 18 }}>
      <div style={{ fontSize: 10, color: "#555", textTransform: "uppercase", letterSpacing: 1, marginBottom: 6 }}>{label}</div>
      <svg width="100%" viewBox={`0 0 ${w} ${h}`} style={{ overflow: "visible" }}>
        <line x1={leftPad} y1={targetY} x2={w} y2={targetY} stroke="#3ecf8e" strokeWidth="1" strokeDasharray="4,3" opacity="0.4" />
        <text x={leftPad - 2} y={targetY + 4} fill="#3ecf8e" fontSize="7" textAnchor="end" opacity="0.6">{targetLine}</text>
        {data.map((d, i) => {
          const x = leftPad + i * (barW + gap);
          const bH = Math.max(2, (d.value / maxVal) * chartH);
          const y = chartH - bH;
          const p = Math.round((d.value / targetLine) * 100);
          const bc = p >= 90 ? "#3ecf8e" : p >= 60 ? "#f59e0b" : "#ef4444";
          return (
            <g key={i}>
              <rect x={x} y={y} width={barW} height={bH} fill={bc} rx="3" opacity={d.isToday ? 1 : 0.5} />
              {d.isToday && <rect x={x} y={y} width={barW} height={bH} fill="url(#shine)" rx="3" opacity="0.3" />}
              <text x={x+barW/2} y={h-6} fill={d.isToday ? "#ccc" : "#444"} fontSize="8" textAnchor="middle">{d.label}</text>
              {d.value > 0 && <text x={x+barW/2} y={y-3} fill={bc} fontSize="7" textAnchor="middle">{d.value}</text>}
            </g>
          );
        })}
        <defs>
          <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor="white" stopOpacity="0.4"/>
            <stop offset="100%" stopColor="white" stopOpacity="0"/>
          </linearGradient>
        </defs>
      </svg>
    </div>
  );
}

function XPToast({ xp, label, onDone, showXP }) {
  useEffect(() => { const t = setTimeout(onDone, 2000); return () => clearTimeout(t); }, []);
  return (
    <div style={{
      position: "fixed", top: 80, left: "50%", transform: "translateX(-50%)",
      background: "#3ecf8e", color: "#000", padding: "8px 18px", borderRadius: 20,
      fontWeight: 700, fontSize: 13, zIndex: 999, boxShadow: "0 4px 20px rgba(62,207,142,0.4)",
      animation: "slideDown 0.3s ease"
    }}>
      {showXP ? `+${xp} XP — ${label} 🎯` : label}
    </div>
  );
}

function AriesTrainer() {

  const [tab, setTab] = useState(0);
  const [foodLog, setFoodLog] = useState(() => loadFromStorage(`food-${todayKey}`, []));
  const [foodInput, setFoodInput] = useState("");
  const [loading, setLoading] = useState(false);
  const [chatHistory, setChatHistory] = useState([]);
  const [coachInput, setCoachInput] = useState("");
  const [coachLoading, setCoachLoading] = useState(false);
  const [selectedDay, setSelectedDay] = useState(new Date().getDay() === 0 ? 6 : new Date().getDay() - 1);
  const [history, setHistory] = useState(() => loadFromStorage("macro-history", {}));
  const [xp, setXp] = useState(() => loadFromStorage("aries-xp", 0));
  const [toast, setToast] = useState(null);
  const [xpAwarded, setXpAwarded] = useState(() => loadFromStorage(`xp-awarded-${todayKey}`, {}));
  const [apiKey, setApiKey] = useState(() => loadFromStorage("aries-api-key", ""));
  const [keyInput, setKeyInput] = useState("");
  const [keyError, setKeyError] = useState("");
  const [showKeySettings, setShowKeySettings] = useState(false);
  const chatEndRef = useRef(null);

  const todayTotals = foodLog.reduce((acc, e) => ({
    calories: acc.calories + (e.macros?.calories || 0),
    protein: acc.protein + (e.macros?.protein || 0),
    carbs: acc.carbs + (e.macros?.carbs || 0),
    fat: acc.fat + (e.macros?.fat || 0),
  }), { calories: 0, protein: 0, carbs: 0, fat: 0 });

  const streak = calcStreak({ ...history, [todayKey]: todayTotals });
  const level = getLevel(xp);
  const nextLevel = LEVELS[LEVELS.indexOf(level) + 1];

  function saveApiKey() {
    const k = keyInput.trim();
    if (!k.startsWith("sk-ant-")) { setKeyError("Key must start with sk-ant-"); return; }
    saveToStorage("aries-api-key", k);
    setApiKey(k);
    setKeyInput("");
    setKeyError("");
    setShowKeySettings(false);
    setToast({ xp: 0, label: "API Key saved 🔑" });
  }

  function clearApiKey() {
    localStorage.removeItem("aries-api-key");
    setApiKey("");
    setShowKeySettings(false);
  }

  function awardXP(amount, label, key) {
    if (xpAwarded[key]) return;
    const newXpAwarded = { ...xpAwarded, [key]: true };
    setXpAwarded(newXpAwarded);
    saveToStorage(`xp-awarded-${todayKey}`, newXpAwarded);
    setXp(prev => { const n = prev + amount; saveToStorage("aries-xp", n); return n; });
    setToast({ xp: amount, label });
  }

  useEffect(() => {
    saveToStorage(`food-${todayKey}`, foodLog);
    const totals = foodLog.reduce((acc, e) => ({
      calories: acc.calories + (e.macros?.calories || 0),
      protein: acc.protein + (e.macros?.protein || 0),
      carbs: acc.carbs + (e.macros?.carbs || 0),
      fat: acc.fat + (e.macros?.fat || 0),
    }), { calories: 0, protein: 0, carbs: 0, fat: 0 });
    setHistory(prev => {
      const updated = { ...prev, [todayKey]: { ...totals, date: todayKey } };
      saveToStorage("macro-history", updated);
      return updated;
    });
    // Award XP for hitting targets
    if (totals.protein >= 80) awardXP(XP_REWARDS.hitProtein, "Protein Target Hit!", "protein-hit");
    if (totals.calories >= 2500) awardXP(XP_REWARDS.hitCalories, "Calorie Goal Reached!", "calorie-hit");
    if (streak >= 7) awardXP(XP_REWARDS.streak7, "7-Day Streak! 🔥", "streak7");
    else if (streak >= 3) awardXP(XP_REWARDS.streak3, "3-Day Streak!", "streak3");

  async function logFood() {
    if (!foodInput.trim()) return;
    setLoading(true);
    const foodText = foodInput;
    setFoodInput("");
    const entry = {
      food: foodText,
      time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
      macros: null, note: "", id: Date.now()
    };
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json", "x-api-key": apiKey, "anthropic-version": "2023-06-01", "anthropic-dangerous-direct-browser-access": "true" },
        body: JSON.stringify({
          model: "claude-sonnet-4-6", max_tokens: 1000, system: SYSTEM_PROMPT,
          messages: [{ role: "user", content: `Estimate macros ONLY for this specific food: "${foodText}". Respond ONLY in JSON, no markdown:\n{"calories":<n>,"protein":<n>,"carbs":<n>,"fat":<n>,"note":"<1-2 line casual coach note>"}` }]

      });
      const data = await res.json();
      const parsed = JSON.parse(data.content?.[0]?.text?.replace(/```json|```/g,"").trim() || "{}");
      entry.macros = { calories: Math.round(parsed.calories||0), protein: Math.round(parsed.protein||0), carbs: Math.round(parsed.carbs||0), fat: Math.round(parsed.fat||0) };
      entry.note = parsed.note || "";
    } catch {
      entry.macros = { calories: 0, protein: 0, carbs: 0, fat: 0 };
      entry.note = "Couldn't estimate. Log manually.";
    }
    setFoodLog(prev => [...prev, entry]);
    awardXP(XP_REWARDS.logFood, "Food Logged", `log-${entry.id}`);
    setLoading(false);

              <MacroBar label="Protein" value={todayTotals.protein} target={MACROS_TARGET.protein} color="#7c6af7"/>

            <div style={{ background:"#111", border:"1px solid #1c1c1c", borderRadius:12, padding:14, marginBottom:12 }}>

                {label:"Calories",rem:Math.max(0,MACROS_TARGET.calories-todayTotals.calories),unit:"kcal",color:"#3ecf8e"},

                {label:"Carbs",rem:Math.max(0,MACROS_TARGET.carbs-todayTotals.carbs),unit:"g",color:"#f59e0b"},

            <div style={{ background:"#0f0f1a", border:"1px solid #1a1a2e", borderRadius:12, padding:14, marginBottom:12 }}>

                  <div style={{ height:"100%", width:`${Math.round(((xp-level.min)/(nextLevel.min-level.min))*100)}%`, background:"#7c6af7", borderRadius:3, transition:"width 0.6s" }}/>

            </div>

              <div style={{ fontSize:12, color:"#999", lineHeight:1.6 }}>
                {todayTotals.protein>=80?"Protein hit ✓ This is exactly how you gain. Keep streak alive tomorrow."

            </div>

        {/* ── HISTORY ── */}
        {tab===2 && (()=>{
          const MONTH_NAMES = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
          const now = new Date();

          // Get all years present in history
          const allYears = [...new Set(Object.keys(history).map(k=>k.slice(0,4)))].sort((a,b)=>b-a);
          const [histView, setHistView] = useState("week"); // week | month | year
          const [selYear, setSelYear] = useState(String(now.getFullYear()));
          const [selMonth, setSelMonth] = useState(now.getMonth()); // 0-indexed

          // --- WEEK DATA (last 7 days) ---
          const weekData = Array.from({length:7},(_,i)=>{
            const d = new Date(); d.setDate(d.getDate()-(6-i));
            const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
            return { label:["Su","Mo","Tu","We","Th","Fr","Sa"][d.getDay()], key, value:Math.round(history[key]?.protein||0), cal:Math.round(history[key]?.calories||0), isToday:key===todayKey };
          });

          // --- MONTH DATA (all days in selected month) ---
          const daysInMonth = new Date(parseInt(selYear), selMonth+1, 0).getDate();
          const monthData = Array.from({length:daysInMonth},(_,i)=>{
            const day = i+1;
            const key = `${selYear}-${String(selMonth+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
            return { label:String(day), key, value:Math.round(history[key]?.protein||0), cal:Math.round(history[key]?.calories||0), isToday:key===todayKey };
          });
          const monthLoggedDays = monthData.filter(d=>d.value>0).length;
          const monthProHit = monthData.filter(d=>d.value>=80).length;
          const monthAvgCal = monthData.filter(d=>d.cal>0).length ? Math.round(monthData.filter(d=>d.cal>0).reduce((a,d)=>a+d.cal,0)/monthData.filter(d=>d.cal>0).length) : 0;

          // --- YEAR DATA (monthly averages) ---
          const yearData = MONTH_NAMES.map((m,mi)=>{
            const prefix = `${selYear}-${String(mi+1).padStart(2,'0')}`;
            const days = Object.entries(history).filter(([k])=>k.startsWith(prefix));
            const avgPro = days.length ? Math.round(days.reduce((a,[,v])=>a+(v.protein||0),0)/days.length) : 0;
            const avgCal = days.length ? Math.round(days.reduce((a,[,v])=>a+(v.calories||0),0)/days.length) : 0;
            const isCurrent = mi===now.getMonth() && selYear===String(now.getFullYear());
            return { label:m, value:avgPro, cal:avgCal, days:days.length, isToday:isCurrent };
          });

          // Mini bar chart for month view (compact)
          const MiniBar = ({data, target, color}) => {
            const maxV = Math.max(...data.map(d=>d.value), target, 1);
            const bw = data.length > 20 ? 7 : 11;
            const gap = data.length > 20 ? 2 : 3;
            const totalW = data.length * (bw+gap);
            return (
              <svg width="100%" viewBox={`0 0 ${totalW} 60`} style={{overflow:"visible", display:"block"}}>
                <line x1={0} y1={50-(target/maxV)*50} x2={totalW} y2={50-(target/maxV)*50} stroke={color} strokeWidth="0.8" strokeDasharray="3,2" opacity="0.4"/>
                {data.map((d,i)=>{
                  const bh = Math.max(1,(d.value/maxV)*50);
                  const y = 50-bh;
                  const bc = d.value>=target?"#3ecf8e":d.value>=(target*0.6)?"#f59e0b":d.value>0?"#ef4444":"#1a1a1a";
                  return <rect key={i} x={i*(bw+gap)} y={y} width={bw} height={bh} fill={bc} rx="1.5" opacity={d.isToday?1:0.7}/>;
                })}
              </svg>
            );
          };

          return (
            <div>
              {/* View toggle */}
              <div style={{display:"flex", gap:6, marginBottom:14}}>
                {["week","month","year"].map(v=>(
                  <button key={v} onClick={()=>setHistView(v)} style={{
                    flex:1, padding:"8px 0", background:histView===v?"#3ecf8e":"#111",
                    color:histView===v?"#000":"#444", border:"1px solid #1c1c1c",
                    borderRadius:8, fontSize:12, fontWeight:700, cursor:"pointer", textTransform:"capitalize"
                  }}>{v==="week"?"7 Days":v==="month"?"Monthly":"Yearly"}</button>
                ))}
              </div>

              {/* WEEK VIEW */}
              {histView==="week" && (
                <div>
                  <div style={{background:"#111", border:"1px solid #1c1c1c", borderRadius:12, padding:14, marginBottom:10}}>
                    <BarChart data={weekData.map(d=>({...d,value:d.cal}))} targetLine={MACROS_TARGET.calories} label="Calories — Last 7 Days"/>
                    <BarChart data={weekData} targetLine={MACROS_TARGET.protein} label="Protein — Last 7 Days"/>
                  </div>
                  <div style={{fontSize:10, color:"#444", textTransform:"uppercase", letterSpacing:1, marginBottom:8}}>Daily Detail</div>
                  {weekData.slice().reverse().map(d=>{
                    const cp = pct(d.cal, MACROS_TARGET.calories);
                    const pp = pct(d.value, MACROS_TARGET.protein);
                    return (
                      <div key={d.key} style={{background:"#111", border:`1px solid ${d.isToday?"#1a3326":"#1c1c1c"}`, borderRadius:10, padding:11, marginBottom:7}}>
                        <div style={{display:"flex", justifyContent:"space-between", marginBottom:6}}>
                          <span style={{fontWeight:600, fontSize:13, color:d.isToday?"#3ecf8e":"#ccc"}}>
                            {d.isToday?"Today":new Date(d.key+"T00:00:00").toLocaleDateString("en-IN",{weekday:"short",day:"numeric",month:"short"})}
                          </span>
                          <span style={{fontSize:11, color:"#444"}}>{d.cal>0?`${d.cal} kcal · ${d.value}g pro`:"—"}</span>
                        </div>
                        {d.cal>0 && <div style={{display:"flex", gap:6}}>
                          {[{label:"Cal",p:cp,c:"#3ecf8e"},{label:"Pro",p:pp,c:"#7c6af7"}].map(m=>(
                            <div key={m.label} style={{flex:1}}>
                              <div style={{fontSize:9, color:"#444", marginBottom:2}}>{m.label} {m.p}%</div>
                              <div style={{height:4, background:"#1a1a1a", borderRadius:2, overflow:"hidden"}}>
                                <div style={{height:"100%", width:`${m.p}%`, background:m.p>=90?m.c:m.p>=60?"#f59e0b":"#ef4444", borderRadius:2}}/>
                              </div>
                            </div>
                          ))}
                        </div>}
                        {d.cal===0 && <div style={{fontSize:11, color:"#2a2a2a"}}>Nothing logged</div>}
                      </div>
                    );
                  })}
                </div>
              )}

              {/* MONTH VIEW */}
              {histView==="month" && (
                <div>
                  {/* Month + Year selector */}
                  <div style={{display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:12}}>
                    <button onClick={()=>{
                      let m=selMonth-1, y=parseInt(selYear);
                      if(m<0){m=11;y--;}
                      setSelMonth(m); setSelYear(String(y));
                    }} style={{background:"#111", border:"1px solid #1c1c1c", color:"#ccc", padding:"6px 12px", borderRadius:8, cursor:"pointer", fontSize:16}}>‹</button>
                    <div style={{fontWeight:700, fontSize:15, color:"#f0f0f0"}}>{MONTH_NAMES[selMonth]} {selYear}</div>
                    <button onClick={()=>{
                      let m=selMonth+1, y=parseInt(selYear);
                      if(m>11){m=0;y++;}
                      setSelMonth(m); setSelYear(String(y));
                    }} style={{background:"#111", border:"1px solid #1c1c1c", color:"#ccc", padding:"6px 12px", borderRadius:8, cursor:"pointer", fontSize:16}}>›</button>
                  </div>

                  {/* Month stats */}
                  <div style={{display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:8, marginBottom:12}}>
                    {[
                      {label:"Days Logged", val:monthLoggedDays, color:"#3ecf8e"},
                      {label:"Protein Hit", val:monthProHit, color:"#7c6af7"},
                      {label:"Avg Calories", val:monthAvgCal, color:"#f59e0b"},
                    ].map(s=>(
                      <div key={s.label} style={{background:"#111", border:"1px solid #1c1c1c", borderRadius:10, padding:"10px 8px", textAlign:"center"}}>
                        <div style={{fontSize:18, fontWeight:700, color:s.color}}>{s.val}{s.label==="Avg Calories"?" kcal":""}</div>
                        <div style={{fontSize:9, color:"#444", textTransform:"uppercase", letterSpacing:0.5, marginTop:2}}>{s.label}</div>
                      </div>
                    ))}
                  </div>

                  {/* Protein bar chart for month */}
                  <div style={{background:"#111", border:"1px solid #1c1c1c", borderRadius:12, padding:14, marginBottom:12}}>
                    <div style={{fontSize:10, color:"#555", textTransform:"uppercase", letterSpacing:1, marginBottom:8}}>Protein (g) — Each Day</div>
                    <MiniBar data={monthData} target={MACROS_TARGET.protein} color="#7c6af7"/>
                    <div style={{display:"flex", justifyContent:"space-between", fontSize:9, color:"#444", marginTop:4}}>
                      <span>1</span><span>{Math.ceil(daysInMonth/2)}</span><span>{daysInMonth}</span>
                    </div>
                  </div>

                  {/* Calendar-style dots */}
                  <div style={{background:"#111", border:"1px solid #1c1c1c", borderRadius:12, padding:14, marginBottom:10}}>
                    <div style={{fontSize:10, color:"#555", textTransform:"uppercase", letterSpacing:1, marginBottom:10}}>Daily Status</div>
                    <div style={{display:"grid", gridTemplateColumns:"repeat(7,1fr)", gap:5, textAlign:"center"}}>
                      {["S","M","T","W","T","F","S"].map((d,i)=><div key={i} style={{fontSize:9, color:"#444", marginBottom:4}}>{d}</div>)}
                      {Array.from({length:new Date(parseInt(selYear),selMonth,1).getDay()}).map((_,i)=><div key={"e"+i}/>)}
                      {monthData.map((d,i)=>{
                        const bc = d.value>=90?"#3ecf8e":d.value>=54?"#f59e0b":d.value>0?"#ef4444":"#1a1a1a";
                        const border = d.isToday?"2px solid #3ecf8e":"2px solid transparent";
                        return (
                          <div key={i} style={{aspectRatio:"1", borderRadius:"50%", background:bc, border, display:"flex", alignItems:"center", justifyContent:"center", fontSize:9, color:d.value>0?"#000":"#333", fontWeight:700}}>
                            {d.label}
                          </div>
                        );
                      })}
                    </div>
                    <div style={{display:"flex", gap:10, marginTop:10, justifyContent:"center"}}>
                      {[{c:"#3ecf8e",l:"Hit"},{c:"#f59e0b",l:"Partial"},{c:"#ef4444",l:"Missed"},{c:"#1a1a1a",l:"No log"}].map(x=>(
                        <div key={x.l} style={{display:"flex", alignItems:"center", gap:4}}>
                          <div style={{width:8, height:8, borderRadius:"50%", background:x.c}}/>
                          <span style={{fontSize:9, color:"#555"}}>{x.l}</span>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>
              )}

              {/* YEAR VIEW */}
              {histView==="year" && (
                <div>
                  {/* Year selector */}
                  <div style={{display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:12}}>
                    <button onClick={()=>setSelYear(y=>String(parseInt(y)-1))} style={{background:"#111", border:"1px solid #1c1c1c", color:"#ccc", padding:"6px 12px", borderRadius:8, cursor:"pointer", fontSize:16}}>‹</button>
                    <div style={{fontWeight:700, fontSize:15, color:"#f0f0f0"}}>{selYear} Overview</div>
                    <button onClick={()=>setSelYear(y=>String(parseInt(y)+1))} style={{background:"#111", border:"1px solid #1c1c1c", color:"#ccc", padding:"6px 12px", borderRadius:8, cursor:"pointer", fontSize:16}}>›</button>
                  </div>

                  {/* Year stats */}
                  {(()=>{
                    const loggedDays = Object.keys(history).filter(k=>k.startsWith(selYear)).length;
                    const proHitDays = Object.entries(history).filter(([k,v])=>k.startsWith(selYear)&&(v.protein||0)>=80).length;
                    const consistency = loggedDays>0?Math.round((proHitDays/Math.max(loggedDays,1))*100):0;
                    return (
                      <div style={{display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:8, marginBottom:14}}>
                        {[
                          {label:"Days Logged", val:loggedDays, color:"#3ecf8e"},
                          {label:"Protein Hit", val:proHitDays, color:"#7c6af7"},
                          {label:"Consistency", val:consistency+"%", color:"#f59e0b"},
                        ].map(s=>(
                          <div key={s.label} style={{background:"#111", border:"1px solid #1c1c1c", borderRadius:10, padding:"10px 8px", textAlign:"center"}}>
                            <div style={{fontSize:18, fontWeight:700, color:s.color}}>{s.val}</div>
                            <div style={{fontSize:9, color:"#444", textTransform:"uppercase", letterSpacing:0.5, marginTop:2}}>{s.label}</div>
                          </div>
                        ))}
                      </div>
                    );
                  })()}

                  {/* Monthly avg protein chart */}
                  <div style={{background:"#111", border:"1px solid #1c1c1c", borderRadius:12, padding:14, marginBottom:12}}>
                    <div style={{fontSize:10, color:"#555", textTransform:"uppercase", letterSpacing:1, marginBottom:8}}>Avg Protein/Day by Month</div>
                    <BarChart data={yearData} targetLine={MACROS_TARGET.protein} label=""/>
                  </div>

                  {/* Monthly breakdown list */}
                  <div style={{fontSize:10, color:"#444", textTransform:"uppercase", letterSpacing:1, marginBottom:8}}>Month by Month</div>
                  {yearData.filter(m=>m.days>0).map((m,i)=>{
                    const pp = pct(m.value, MACROS_TARGET.protein);
                    const cp = pct(m.cal, MACROS_TARGET.calories);
                    return (
                      <div key={i} style={{background:"#111", border:`1px solid ${m.isToday?"#1a3326":"#1c1c1c"}`, borderRadius:10, padding:11, marginBottom:7}}>
                        <div style={{display:"flex", justifyContent:"space-between", marginBottom:6}}>
                          <span style={{fontWeight:700, fontSize:13, color:m.isToday?"#3ecf8e":"#ccc"}}>{m.label} {selYear}</span>
                          <span style={{fontSize:11, color:"#444"}}>{m.days} days · avg {m.value}g pro</span>
                        </div>
                        <div style={{display:"flex", gap:6}}>
                          {[{label:"Avg Cal",p:cp,c:"#3ecf8e"},{label:"Avg Pro",p:pp,c:"#7c6af7"}].map(x=>(
                            <div key={x.label} style={{flex:1}}>
                              <div style={{fontSize:9, color:"#444", marginBottom:2}}>{x.label} {x.p}%</div>
                              <div style={{height:4, background:"1a1a1a", borderRadius:2, overflow:"hidden"}}>
                                <div style={{height:"100%", width:`${x.p}%`, background:x.p>=90?x.c:x.p>=60?"#f59e0b":"#ef4444", borderRadius:2}}/>
                              </div>
                            </div>
                          ))}
                        </div>
                      </div>
                    );
                  })}
                  {yearData.every(m=>m.days===0)&&<div style={{color:"#2a2a2a", fontSize:13, textAlign:"center", padding:"30px 0"}}>No data for {selYear} yet.</div>}
                </div>
              )}
            </div>
          );
        })()}

        {/* ── COACH ── */}
        {tab===3 && (
          <div style={{ display:"flex", flexDirection:"column", height:"calc(100vh - 260px)" }}>
            <div style={{ flex:1, overflowY:"auto", paddingBottom:10 }}>
              {chatHistory.length===0 && (
                <div style={{ color:"#2a2a2a", fontSize:12, textAlign:"center", paddingTop:30 }}>
                  Your coach knows your full profile,<br/>today's food log, and your goals.<br/>Ask anything.
                </div>
              )}
              {chatHistory.map((msg,i)=>(
                <div key={i} style={{ marginBottom:10, display:"flex", flexDirection:msg.role==="user"?"row-reverse":"row" }}>
                  {msg.role==="assistant"&&<div style={{ width:28, height:28, borderRadius:14, background:"#0d1a14", border:"1px solid #1a3326", display:"flex", alignItems:"center", justifyContent:"center", fontSize:12, flexShrink:0, marginRight:8 }}>🏋️</div>}
                  <div style={{ maxWidth:"82%", padding:"10px 13px", borderRadius:12, background:msg.role==="user"?"#3ecf8e":"#111", color:msg.role==="user"?"#000":"#ddd", fontSize:13, lineHeight:1.6, border:msg.role==="assistant"?"1px solid #1c1c1c":"none" }}>{msg.content}</div>
                </div>
              ))}
              {coachLoading&&<div style={{ display:"flex", alignItems:"center", gap:8 }}><div style={{ width:28, height:28, borderRadius:14, background:"#0d1a14", border:"1px solid #1a3326", display:"flex", alignItems:"center", justifyContent:"center", fontSize:12 }}>🏋️</div><div style={{ padding:"10px 13px", background:"#111", borderRadius:12, border:"1px solid #1c1c1c", color:"#444", fontSize:13 }}>Thinking…</div></div>}
              <div ref={chatEndRef}/>
            </div>
            <div style={{ display:"flex", gap:8, paddingTop:10, borderTop:"1px solid #1a1a1a" }}>
              <input value={coachInput} onChange={e=>setCoachInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&!coachLoading&&askCoach()} placeholder="Ask your coach…" style={{ flex:1, padding:"11px 13px", background:"#111", border:"1px solid #222", borderRadius:8, color:"#f0f0f0", fontSize:13, outline:"none" }}/>
              <button onClick={askCoach} disabled={coachLoading} style={{ padding:"11px 15px", background:coachLoading?"#1a1a1a":"#3ecf8e", color:coachLoading?"#444":"#000", border:"none", borderRadius:8, fontWeight:700, cursor:coachLoading?"not-allowed":"pointer", fontSize:14 }}>{coachLoading?"…":"→"}</button>
            </div>
          </div>
        )}

        {/* ── WORKOUT ── */}
        {tab===4 && (
          <div>
            <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", gap:4, marginBottom:16 }}>
              {DAYS.map((d,i)=>(
                <button key={d} onClick={()=>setSelectedDay(i)} style={{ padding:"7px 0", background:selectedDay===i?"#3ecf8e":"#111", color:selectedDay===i?"#000":"#444", border:"1px solid #1c1c1c", borderRadius:6, fontSize:10, fontWeight:700, cursor:"pointer", textAlign:"center" }}>
                  <div>{d}</div>
                  <div style={{ fontSize:7, marginTop:1, color:selectedDay===i?"#004d2e":"#2a2a2a" }}>{WEEK_SCHEDULE[i]}</div>
                </button>
              ))}
            </div>

            {todayWorkout==="Rest" ? (
              <div style={{ background:"#111", border:"1px solid #1c1c1c", borderRadius:12, padding:24, textAlign:"center" }}>
                <div style={{ fontSize:32, marginBottom:8 }}>😴</div>
                <div style={{ fontWeight:700, fontSize:15, marginBottom:6 }}>Rest Day</div>
                <div style={{ color:"#444", fontSize:12, lineHeight:1.6 }}>Muscles grow on rest days, not training days.<br/>Eat your calories. Sleep 7-8 hours.<br/>Come back stronger tomorrow.</div>
              </div>
            ) : (
              <div>
                <div style={{ background:"#0d1a14", border:"1px solid #1a3326", borderRadius:12, padding:14, marginBottom:14 }}>
                  <div style={{ fontSize:18, marginBottom:4 }}>{workout.emoji}</div>
                  <div style={{ fontWeight:700, fontSize:16, marginBottom:2 }}>{workout.day}</div>
                  <div style={{ fontSize:11, color:"#3ecf8e" }}>{workout.focus}</div>
                </div>
                {workout.exercises.map((ex,i)=>(
                  <div key={i} style={{ background:"#111", border:"1px solid #1c1c1c", borderRadius:10, padding:12, marginBottom:7 }}>
                    <div style={{ display:"flex", justifyContent:"space-between", marginBottom:3 }}>
                      <div style={{ fontWeight:600, fontSize:13 }}>{ex.emoji} {ex.name}</div>
                      <div style={{ fontSize:11, color:"#3ecf8e", fontWeight:700 }}>{ex.sets} × {ex.reps}</div>
                    </div>
                    <div style={{ fontSize:11, color:"#444" }}>{ex.note}</div>
                  </div>
                ))}
                <div style={{ background:"#0d1a14", border:"1px solid #1a3326", borderRadius:10, padding:11, marginTop:10 }}>
                  <div style={{ fontSize:10, color:"#3ecf8e", marginBottom:3, textTransform:"uppercase", letterSpacing:1 }}>Rules</div>
                  <div style={{ fontSize:11, color:"#777", lineHeight:1.6 }}>Stop 2 reps before failure · Pain ≠ soreness · Eat within 30 min after · Log your food today</div>
                </div>
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(AriesTrainer));
  </script>
  <script>
    if('serviceWorker' in navigator){
      window.addEventListener('load',()=>{
        navigator.serviceWorker.register('sw.js')
          .then(()=>console.log('SW ok'))
          .catch(e=>console.log('SW skip',e));
      });
    }
  </script>
</body>
</html>
